services:
  - type: web
    name: medical-certificate-system
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: cd backend && npm ci && cd ../frontend && npm ci && npm run build
    preDeployCommand: cd backend && npm run migrate
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: medical-certificates-db
          property: connectionString
      - key: GMAIL_ENABLED
        value: false
      - key: BEEM_ENABLED
        value: false
      - key: MOJAWAVE_ENABLED
        value: false

databases:
  - name: medical-certificates-db
    databaseName: medical_certificates
    user: medical_admin
    region: frankfurt
    plan: basic-256mb
